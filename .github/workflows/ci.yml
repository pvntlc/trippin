name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]
  workflow_dispatch:

jobs:
  backend:
    name: Backend (import + 라우트 체크)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Import app & init DB
        run: |
          python -c "
          import asyncio
          from main import app
          from app.core.database import init_db
          asyncio.run(init_db())
          n = len([r for r in app.routes if getattr(r, 'path', '').startswith('/api')])
          assert n > 0, 'no API routes registered'
          print(f'OK: {n} API routes')
          "

  frontend:
    name: Frontend (타입체크)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Type check
        run: npm run tsc

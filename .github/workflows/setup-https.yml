name: Setup Trippin HTTPS

on:
  push:
    branches: [ ops/https ]

jobs:
  https:
    name: nginx and certbot for trippin subdomain
    runs-on: ubuntu-latest
    steps:
      - name: Configure HTTPS on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key:      ${{ secrets.OCI_SSH_KEY }}
          port:     2222
          script: |
            set -e
            DOMAIN=trippin.168-107-32-252.sslip.io
            cd ~/trippin
            git fetch origin ops/https
            echo "=== stock-manager 블록 원복 (certbot이 트리핀 도메인 붙인 것 되돌리기) ==="
            sudo cp ~/stock-manager/deploy/nginx.conf /etc/nginx/sites-available/stock-manager
            echo "=== 트리핀 블록 설치 (server_name=트리핀 도메인 → :8002) ==="
            git show origin/ops/https:deploy/nginx-trippin.conf | sudo tee /etc/nginx/sites-available/trippin > /dev/null
            echo "--- 설치된 트리핀 설정(앞부분) ---"
            head -8 /etc/nginx/sites-available/trippin
            sudo ln -sf /etc/nginx/sites-available/trippin /etc/nginx/sites-enabled/trippin
            sudo nginx -t
            sudo systemctl reload nginx
            echo "=== certbot HTTPS 인증서를 트리핀 블록에 ==="
            sudo certbot --nginx -d "$DOMAIN" --non-interactive --agree-tos --redirect --keep-until-expiring -m lightbulbtion@gmail.com || true
            sudo nginx -t
            sudo systemctl reload nginx
            echo "=== 검증: 각 도메인이 올바른 백엔드로 가는지 ==="
            echo -n "트리핀 https /health (service:trippin 이어야 정상): "
            curl -s https://$DOMAIN/health
            echo ""
            echo -n "stock-manager IP /health (env/version 이어야 정상): "
            curl -sk https://168.107.32.252/health
            echo ""
            echo -n "date-with-munch sslip: "
            curl -sk -o /dev/null -w "%{http_code}\n" https://168-107-32-252.sslip.io/
            ls -l /etc/nginx/sites-enabled/

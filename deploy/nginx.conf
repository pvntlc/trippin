# Trippin nginx 설정.
# stock-manager 가 같은 VPS 의 80/443(server_name _)을 catch-all 로 쓰고 있으므로
# Trippin 은 별도 server_name(서브도메인) 으로 분리한다.
#   예) trippin.<your-domain>  또는  DNS 없이 테스트 시 포트로 직접 접근.
# 이 파일을 /etc/nginx/sites-available/trippin 으로 복사 후 sites-enabled 에 심볼릭 링크.

server {
    listen 80;
    server_name trippin.example.com;   # ← 실제 도메인/서브도메인으로 교체

    # 프론트엔드 (Expo web 정적 빌드)
    location / {
        root /var/www/trippin;
        try_files $uri $uri/ /index.html;
    }

    # 백엔드 API
    location /api/ {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    location /health {
        proxy_pass http://127.0.0.1:8002;
    }
}
